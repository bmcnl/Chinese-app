<html lang="fr">
<head>
<meta charset="UTF-8">

<style>
:root{
  --paper:#F3EFE6;
  --paper-2:#E8E1D0;
  --ink:#232323;
  --ink-soft:#5A564D;
  --cinnabar:#B7282E;
  --cinnabar-dark:#8C1F24;
  --jade:#2F6F4E;
  --jade-light:#5C9C7C;
  --gold:#C9A24B;
  --gold-light:#E0C179;
  --ok:#2E7D46;
  --bad:#A83232;
  --radius:14px;
}

[data-theme="dark"]{
  --paper:#1A1A1A;
  --paper-2:#2A2A2A;
  --ink:#E8E8E8;
  --ink-soft:#A0A0A0;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  min-height:100vh;
}
h1,h2,h3,.display{
  font-family:'Noto Serif SC',serif;
  color:var(--ink);
  letter-spacing:-0.01em;
}
.han{font-family:'Noto Sans SC',sans-serif;}
.py{font-family:'Inter',sans-serif;font-style:italic;color:var(--cinnabar);}

.topbar{
  background:linear-gradient(180deg,#1A1A1A,var(--ink));
  color:var(--paper);
  padding:22px 24px 26px;
  position:relative;
  border-bottom:4px solid var(--cinnabar);
}
.topbar::after{
  content:"";
  position:absolute;left:0;right:0;bottom:-4px;height:2px;
  background:var(--gold);
}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;max-width:1180px;margin:0 auto;}
.brand{display:flex;align-items:center;gap:14px;}
.seal{
  width:44px;height:44px;flex-shrink:0;background:var(--cinnabar);border-radius:8px;
  display:flex;align-items:center;justify-content:center;transform:rotate(-4deg);
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.seal span{font-family:'Noto Serif SC',serif;color:var(--paper);font-size:1.5rem;font-weight:700;}
.brand h1{color:var(--paper);font-size:1.6rem;margin:0;font-weight:600;}
.brand p{margin:3px 0 0;color:var(--gold-light);font-size:.88rem;}
.menu-btn{
  display:none;background:var(--cinnabar);color:var(--paper);border:none;
  padding:9px 14px;border-radius:10px;font-weight:600;cursor:pointer;font-family:inherit;
}
.theme-btn{
  background:none;border:none;font-size:1.2rem;cursor:pointer;padding:6px 10px;
  border-radius:8px;transition:background 0.2s;
}
.theme-btn:hover{background:var(--paper-2);}
[data-theme="dark"] .theme-btn:hover{background:var(--paper-2);}

.layout{display:flex;max-width:1180px;margin:0 auto;align-items:flex-start;}
.sidebar{
  width:280px;flex-shrink:0;padding:26px 14px 60px 6px;position:sticky;top:0;
  max-height:100vh;overflow-y:auto;
}
.level-label{
  font-size:.72rem;text-transform:uppercase;letter-spacing:.09em;color:var(--cinnabar);
  font-weight:700;margin:22px 0 8px 18px;
}
.level-label:first-child{margin-top:0;}
.unit-track{position:relative;padding-left:26px;}
.unit-track::before{
  content:"";position:absolute;left:9px;top:6px;bottom:6px;width:3px;
  background:linear-gradient(var(--jade-light),var(--paper-2));
  border-radius:3px;
}
.unit-item{
  position:relative;display:block;width:100%;text-align:left;background:none;border:none;
  font-family:inherit;padding:9px 10px 9px 6px;margin-bottom:2px;border-radius:10px;cursor:pointer;
  color:var(--ink-soft);font-size:.87rem;line-height:1.25;
}
.unit-item::before{
  content:"";position:absolute;left:-21px;top:14px;width:11px;height:11px;border-radius:50%;
  background:var(--paper);border:2.5px solid var(--jade-light);
}
.unit-item.done::before{background:var(--jade);border-color:var(--jade);}
.unit-item.active{background:var(--gold-light);color:var(--ink);font-weight:600;}
.unit-item.active::before{background:var(--cinnabar);border-color:var(--cinnabar-dark);width:13px;height:13px;left:-22px;top:13px;}
.unit-item small{display:block;color:var(--ink-soft);font-weight:400;font-size:.75rem;}
.unit-item.active small{color:var(--ink);}
.unit-check{position:absolute;right:8px;top:10px;font-size:.72rem;color:var(--jade);}
.translator-panel{
  background:#fff;border:1px solid var(--paper-2);border-radius:var(--radius);
  padding:16px 14px;margin:20px 6px 0 6px;margin-top:auto;
}
.translator-panel h4{
  margin:0 0 12px;font-size:.9rem;color:var(--ink);font-weight:600;
}
.translator-panel textarea{
  width:100%;border:1px solid var(--paper-2);border-radius:8px;
  padding:10px;font-family:inherit;font-size:.85rem;resize:none;
  color:var(--ink);background:#f9f8f6;
}
.translator-panel textarea:focus{
  outline:none;border-color:var(--cinnabar);box-shadow:0 0 0 2px rgba(183,40,46,0.1);
}
.translator-buttons{
  display:flex;gap:8px;margin-top:10px;
}
.translate-btn{
  flex:1;background:var(--cinnabar);color:#fff;border:none;border-radius:8px;
  padding:8px 12px;font-size:.85rem;font-weight:600;cursor:pointer;
  transition:background 0.2s;
}
.translate-btn:hover{background:#a01f25;}
.translate-btn:active{transform:scale(0.98);}
.clear-translator-btn{
  background:var(--paper-2);color:var(--ink);border:none;border-radius:8px;
  padding:8px 12px;font-size:.85rem;cursor:pointer;
  transition:background 0.2s;
}
.clear-translator-btn:hover{background:#e8e5de;}
.translator-output{
  margin-top:12px;padding:12px;background:#f9f8f6;border-radius:8px;
}
.translator-output p{
  margin:0 0 8px;font-size:.8rem;color:var(--ink-soft);font-weight:600;
}
.translator-output #translatorResult{
  font-size:.9rem;color:var(--ink);line-height:1.5;
}
.wotd-panel{
  background:linear-gradient(135deg, var(--cinnabar-light) 0%, var(--jade-light) 100%);
  border-radius:var(--radius);padding:16px 14px;margin:0 6px 16px 6px;
  color:var(--ink);text-align:center;
}
.wotd-panel .label{font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
.wotd-panel .han{font-size:2rem;margin:10px 0 6px;display:block;font-weight:700;}
.wotd-panel .py{font-size:1rem;color:var(--ink-soft);margin:0 0 8px;font-style:italic;}
.wotd-panel .fr{font-size:.95rem;font-weight:500;margin:8px 0;}
.wotd-panel .audio-btn{
  background:var(--ink);color:#fff;border:none;border-radius:6px;
  padding:6px 10px;font-size:.8rem;cursor:pointer;margin-top:8px;
}
.progress-section{
  background:#fff;border:1px solid var(--paper-2);border-radius:var(--radius);
  padding:12px 14px;margin:0 6px 16px 6px;
}
.progress-label{font-size:.85rem;color:var(--ink-soft);margin-bottom:6px;font-weight:600;}
.progress-bar{
  width:100%;height:8px;background:var(--paper-2);border-radius:4px;overflow:hidden;
}
.progress-fill{height:100%;background:linear-gradient(90deg, var(--jade), var(--cinnabar));
  transition:width 0.3s ease;border-radius:4px;
}
.resources-section{
  background:var(--paper-light);border-radius:var(--radius);padding:12px 14px;
  margin:0 6px 12px 6px;font-size:.85rem;
}
.resources-section h5{margin:0 0 8px;color:var(--cinnabar);font-size:.9rem;}
.resources-section a{
  display:inline-block;background:#fff;color:var(--jade);padding:4px 8px;
  border-radius:4px;margin:2px 4px 2px 0;text-decoration:none;font-size:.8rem;
  border:1px solid var(--jade-light);transition:all 0.2s;
}
.resources-section a:hover{background:var(--jade-light);color:var(--ink);}
.glossary-section{
  background:#fff;border:1px solid var(--paper-2);border-radius:var(--radius);
  padding:16px 14px;margin:16px 6px 0 6px;
}
.glossary-section h4{margin:0 0 12px;font-size:.95rem;color:var(--ink);}
.glossary-filter{
  display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;
}
.filter-btn{
  background:var(--paper-2);color:var(--ink);border:none;border-radius:6px;
  padding:6px 12px;font-size:.8rem;cursor:pointer;white-space:nowrap;
  transition:all 0.2s;
}
.filter-btn.active{background:var(--cinnabar);color:#fff;font-weight:600;}
.glossary-list{
  max-height:300px;overflow-y:auto;border:1px solid var(--paper-2);border-radius:6px;
  padding:10px;
}
.glossary-item{
  padding:8px 0;border-bottom:1px solid var(--paper-2);font-size:.85rem;
  display:flex;align-items:center;justify-content:space-between;
}
.glossary-item:last-child{border-bottom:none;}
.glossary-item .han{font-weight:600;color:var(--ink);min-width:40px;}
.glossary-item .py{color:var(--ink-soft);font-size:.8rem;margin:0 8px;}
.glossary-item .fr{flex:1;color:var(--ink);font-size:.85rem;}
.glossary-item .level-badge{
  font-size:.7rem;background:var(--jade-light);color:var(--ink);
  padding:2px 6px;border-radius:3px;margin-left:8px;
}

main{flex:1;padding:34px 30px 90px;min-width:0;}
.unit-header{margin-bottom:26px;}
.eyebrow{
  display:inline-block;background:var(--ink);color:var(--gold-light);
  padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;margin-bottom:10px;
}
.unit-header h2{font-size:2rem;margin:0 0 6px;}
.unit-header .sub{color:var(--ink-soft);font-size:1rem;margin:0;}

section.block{
  background:#fff;border:1px solid var(--paper-2);border-radius:var(--radius);
  padding:22px 24px;margin-bottom:22px;
}
section.block h3{
  margin:0 0 14px;font-size:1.15rem;display:flex;align-items:center;gap:8px;
}
section.block h3::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--cinnabar);}

.vocab-table{width:100%;border-collapse:collapse;font-size:.93rem;}
.vocab-table th{
  text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;
  color:var(--cinnabar);padding:6px 10px;border-bottom:2px solid var(--paper-2);
}
.vocab-table td{padding:9px 10px;border-bottom:1px solid var(--paper-2);vertical-align:top;}
.vocab-table tr:last-child td{border-bottom:none;}
.han-cell{display:flex;align-items:center;gap:7px;}
.han-word{font-weight:700;color:var(--ink);font-size:1.15rem;}
.note{color:var(--ink-soft);font-size:.81rem;}
.audio-btn{
  border:none;background:var(--paper);color:var(--cinnabar);width:26px;height:26px;border-radius:50%;
  cursor:pointer;font-size:.85rem;flex-shrink:0;line-height:1;
}
.audio-btn:hover{background:var(--gold-light);color:var(--ink);}
.audio-note{
  background:var(--paper);border-left:3px solid var(--jade-light);padding:9px 14px;
  border-radius:0 8px 8px 0;font-size:.83rem;color:var(--ink-soft);margin-bottom:16px;
}

.grammar-body p{line-height:1.6;margin:0 0 12px;}
.grammar-body ul{line-height:1.6;padding-left:20px;margin:0 0 12px;}
.callout{
  background:var(--paper);border-left:3px solid var(--gold);
  padding:10px 14px;border-radius:0 8px 8px 0;font-size:.9rem;margin:12px 0;
}

.dialogue-line{display:flex;gap:10px;margin-bottom:12px;align-items:baseline;flex-wrap:wrap;}
.speaker{flex-shrink:0;width:64px;font-weight:700;color:var(--cinnabar);font-size:.85rem;}
.dialogue-line .h{font-weight:700;font-size:1.1rem;display:flex;align-items:center;gap:6px;}
.dialogue-line .fr{color:var(--ink-soft);font-size:.86rem;width:100%;padding-left:74px;}

.exercise{margin-bottom:20px;padding-bottom:18px;border-bottom:1px dashed var(--paper-2);}
.exercise:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.exercise .q{font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.options{display:flex;flex-direction:column;gap:8px;}
.opt-btn{
  text-align:left;padding:10px 14px;border-radius:9px;border:1.5px solid var(--paper-2);
  background:var(--paper);cursor:pointer;font-family:inherit;font-size:.92rem;color:var(--ink);
}
.opt-btn:hover{border-color:var(--jade-light);}
.opt-btn.correct{background:#E4F3E7;border-color:var(--ok);color:var(--ok);font-weight:600;}
.opt-btn.wrong{background:#F7E7E5;border-color:var(--bad);color:var(--bad);}
.opt-btn:disabled{cursor:default;}
.fill-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.fill-row input{
  padding:9px 12px;border-radius:9px;border:1.5px solid var(--paper-2);font-family:inherit;
  font-size:.92rem;min-width:180px;
}
.fill-row input.correct{border-color:var(--ok);background:#E4F3E7;}
.fill-row input.wrong{border-color:var(--bad);background:#F7E7E5;}
.check-btn{
  background:var(--cinnabar);color:#fff;border:none;padding:9px 16px;border-radius:9px;
  cursor:pointer;font-family:inherit;font-weight:600;font-size:.88rem;
}
.check-btn:hover{background:var(--cinnabar-dark);}
.check-btn:disabled{background:var(--paper-2);color:var(--ink-soft);cursor:not-allowed;}
.fb{font-size:.85rem;margin-top:6px;font-weight:600;}
.fb.ok-fb{color:var(--ok);}
.fb.bad-fb{color:var(--bad);}
.big-audio-btn{
  border:none;background:var(--ink);color:#fff;padding:8px 16px;border-radius:9px;
  cursor:pointer;font-family:inherit;font-weight:600;font-size:.88rem;margin-bottom:12px;
}
.big-audio-btn:hover{background:var(--cinnabar-dark);}

.score-bar{
  display:flex;justify-content:space-between;align-items:center;background:var(--ink);
  color:var(--paper);padding:14px 20px;border-radius:var(--radius);margin-top:6px;
}
.score-bar .num{font-family:'Noto Serif SC',serif;font-size:1.4rem;color:var(--gold-light);}

@media(max-width:880px){
  .layout{flex-direction:column;}
  .sidebar{
    position:fixed;left:0;top:0;bottom:0;background:var(--paper);z-index:20;
    transform:translateX(-100%);transition:transform .25s ease;width:82%;max-width:320px;
    box-shadow:4px 0 18px rgba(0,0,0,.15);padding-top:70px;
  }
  .sidebar.open{transform:translateX(0);}
  .menu-btn{display:inline-block;}
  main{padding:24px 16px 80px;}
  .dialogue-line .fr{padding-left:0;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="seal"><span>中</span></div>
      <div>
        <h1>中文 · Mandarin</h1>
        <p>Vocabulaire, grammaire, audio et exercices</p>
      </div>
    </div>
    <button class="menu-btn" id="menuBtn">☰ Unités</button>
    <button class="theme-btn" id="themeBtn" title="Mode sombre">🌙</button>
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div id="unitListWrap"></div>
    <div id="translatorWrap">
      <div class="translator-panel">
        <h4>🌐 Traducteur</h4>
        <textarea id="translatorInput" placeholder="Collez le texte à traduire..." rows="4"></textarea>
        <div class="translator-buttons">
          <button id="translateBtn" class="translate-btn">Traduire (DeepL)</button>
          <button id="clearTranslatorBtn" class="clear-translator-btn">Effacer</button>
        </div>
        <div id="translatorOutput" class="translator-output" style="display:none;">
          <p>Traduction:</p>
          <div id="translatorResult"></div>
        </div>
      </div>
    </div>
  </nav>

  <main id="main"></main>
</div>

<script>
/* ---------------------------------------------------------
   AUDIO — synthèse vocale du navigateur (Web Speech API)
--------------------------------------------------------- */
function speak(text){
  if(!('speechSynthesis' in window)){ alert("La synthèse vocale n'est pas disponible sur ce navigateur."); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 0.85;
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v=>v.lang && v.lang.toLowerCase().startsWith('zh'));
  if(zhVoice) u.voice = zhVoice;
  window.speechSynthesis.speak(u);
}

/* ---------------------------------------------------------
   DONNÉES DES UNITÉS
   Caractères simplifiés (norme de Chine continentale) + pinyin.
--------------------------------------------------------- */
const units = [
{
  id:1, level:1,
  title:"声调与拼音基础",
  sub:"Les tons et le système pinyin",
  intro:"Le mandarin utilise 4 tons (+ un ton neutre) : la même syllabe change complètement de sens selon le ton. C'est la première difficulté à dompter, et la plus importante.",
  vocab:[
    {han:"妈",py:"mā",fr:"maman (1er ton, plat et haut)",note:"illustre le 1er ton"},
    {han:"麻",py:"má",fr:"chanvre / engourdi (2e ton, montant)",note:"illustre le 2e ton"},
    {han:"马",py:"mǎ",fr:"cheval (3e ton, descendant-montant)",note:"illustre le 3e ton"},
    {han:"骂",py:"mà",fr:"insulter, gronder (4e ton, descendant net)",note:"illustre le 4e ton — même syllabe, 4 sens différents !"},
    {han:"吗",py:"ma",fr:"particule interrogative (ton neutre)",note:"illustre le ton neutre, atone"},
    {han:"你好",py:"nǐ hǎo",fr:"bonjour",note:"deux 3e tons de suite : le premier se prononce comme un 2e ton (sandhi)"},
    {han:"谢谢",py:"xièxie",fr:"merci",note:""},
    {han:"对不起",py:"duìbuqǐ",fr:"pardon, désolé",note:""},
    {han:"不",py:"bù",fr:"non, ne...pas",note:"devient bú devant un 4e ton (不是 búshì)"},
    {han:"是",py:"shì",fr:"être / oui",note:""},
    {han:"请",py:"qǐng",fr:"s'il vous plaît, je vous prie",note:""},
    {han:"再见",py:"zàijiàn",fr:"au revoir",note:""}
  ],
  grammar:`
    <p>Le mandarin est une langue à tons : la hauteur/mélodie de la voix sur une syllabe en change le sens, pas juste l'intonation comme en français.</p>
    <ul>
      <li><b>1er ton (ā)</b> : plat et haut, comme si on tenait une note de chant.</li>
      <li><b>2e ton (á)</b> : montant, comme une question courte en français ("Hein ?").</li>
      <li><b>3e ton (ǎ)</b> : descend puis remonte légèrement, souvent plus bas et plus long.</li>
      <li><b>4e ton (à)</b> : descend fort et net, comme un ordre bref.</li>
      <li><b>Ton neutre</b> : atone, léger, sans hauteur marquée (吗 ma, 了 le...).</li>
    </ul>
    <p><b>Règle de sandhi du 3e ton :</b> quand deux 3e tons se suivent, le premier se prononce comme un 2e ton à l'oral (l'écrit pinyin ne change pas). C'est le cas de 你好 (nǐ hǎo), en réalité prononcé "ní hǎo".</p>
    <div class="callout">Astuce : entraînez-vous d'abord sur le mot 妈/麻/马/骂 (mā/má/mǎ/mà) — c'est l'exemple classique pour sentir la différence entre les 4 tons.</div>
  `,
  dialogue:[
    {sp:"A",han:"你好！",fr:"Bonjour !"},
    {sp:"B",han:"你好，谢谢！",fr:"Bonjour, merci !"}
  ],
  ex:{
    mcq:[
      {q:"Combien de tons compte le mandarin standard (ton neutre inclus) ?",options:["3","5","6"],a:1},
      {q:"Le 4e ton (à) se prononce :",options:["plat et haut","montant","descendant, net et bref"],a:2},
      {q:"« 你好 » (nǐ hǎo) illustre :",options:["le ton neutre","la règle de sandhi du 3e ton","le 1er ton"],a:1}
    ],
    listen:[
      {word:"妈",options:["maman (1er ton)","cheval (3e ton)","insulter (4e ton)"],a:0},
      {word:"谢谢",options:["merci","pardon","au revoir"],a:0}
    ],
    fill:[
      {sentence:"« Merci » se dit ___ ___ (pinyin : xièxie).",answer:"xie xie",hint:"2 syllabes identiques"},
      {sentence:"« Non, ne pas » se dit ___ (pinyin).",answer:"bu",hint:"1 syllabe, 4e ton"},
      {sentence:"« Pardon, désolé » se dit duì___qǐ.",answer:"bu",hint:"1 syllabe"}
    ]
  }
},
{
  id:2, level:1,
  title:"打招呼与人称代词",
  sub:"Salutations et pronoms personnels",
  intro:"Bonne nouvelle : en mandarin, les pronoms ne changent jamais le verbe (pas de conjugaison !). Il suffit d'apprendre la liste de base.",
  vocab:[
    {han:"我",py:"wǒ",fr:"je, moi",note:""},

{
  id:5, level:1,
  title:"语气助词与基本句子结构",
  sub:"Particules modales et structure de phrase de base",
  intro:"Le mandarin utilise de petites particules en fin de phrase pour transformer une affirmation en question, adoucir une suggestion, ou marquer un changement d'état.",
  vocab:[
    {han:"吗",py:"ma",fr:"particule interrogative (oui/non)",note:"transforme une affirmation en question fermée"},
    {han:"呢",py:"ne",fr:"et toi/lui ? (question de reprise) / particule de continuité",note:""},
    {han:"了",py:"le",fr:"particule d'achèvement / de changement d'état",note:""},
    {han:"吧",py:"ba",fr:"particule de suggestion/supposition",note:"adoucit un ordre ou exprime une quasi-certitude"},
    {han:"没",py:"méi",fr:"négation du passé / de la possession",note:"没有 = ne pas avoir / ne pas avoir fait"},
    {han:"也",py:"yě",fr:"aussi",note:""},
    {han:"都",py:"dōu",fr:"tous, tout",note:""}
  ],
  grammar:`
    <p>Structure de base : <span class="mono">Sujet + Verbe + Complément</span>, très proche du français — pas d'inversion pour les questions.</p>
    <ul>
      <li>Question fermée : ajouter <span class="mono">吗</span> en fin de phrase affirmative — <i>你是学生吗？</i> (Tu es étudiant ?)</li>
      <li><span class="mono">呢</span> reprend une question déjà posée : <i>我很好，你呢？</i> (Je vais bien, et toi ?)</li>
      <li><span class="mono">了</span> marque soit une action achevée (<i>我吃了</i>, j'ai mangé), soit un changement d'état (<i>天冷了</i>, il fait froid maintenant [alors qu'avant non]).</li>
      <li><span class="mono">吧</span> adoucit une suggestion (<i>走吧！</i>, allons-y !) ou marque une quasi-certitude (<i>你是法国人吧？</i>, t'es français, non ?).</li>
      <li>Négation : <span class="mono">不</span> pour le général/habituel/futur (<i>我不吃</i>, je ne mange pas) vs <span class="mono">没(有)</span> pour le passé/la possession (<i>我没吃</i>, je n'ai pas mangé ; <i>我没有钱</i>, je n'ai pas d'argent).</li>
    </ul>
    <div class="callout">Le choix entre 不 et 没 est un des pièges classiques du débutant : 不 nie une intention/habitude, 没 nie un fait accompli ou une possession.</div>
  `,

  ],

  intro:"Un lot de mots-outils extrêmement fréquents du programme HSK1, notamment le rôle très particulier de 很 devant un adjectif.",
  vocab:[

    {han:"和",py:"hé",fr:"et (entre deux noms)",note:""}

  grammar:`
    <p>Point essentiel : un adjectif seul fonctionne déjà comme prédicat, sans « être » (是) — mais on ajoute presque toujours <span class="mono">很</span> devant, même sans intensifier vraiment le sens : <i>我很好。</i> (Je vais bien — pas forcément « très » bien.)</p>

      <li><span class="mono">太 + adjectif + 了</span> exprime l'excès, souvent avec emphase : <i>太贵了！</i> (C'est trop cher !)</li>

      <li><span class="mono">得</span> relie un verbe à un complément qui décrit le résultat/degré de l'action, toujours après le verbe : <i>他说得很清楚。</i> (Il parle très clairement.)</li>
      <li><span class="mono">地</span> relie un adjectif (transformé en adverbe) à un verbe qui suit : <i>他高兴地说。</i> (Il a dit ça joyeusement.)</li>

    <p>La structure « A-非-A » (répéter le verbe/adjectif à l'affirmatif puis au négatif) est une façon très courante de poser une question fermée, alternative à 吗.</p>

  grammar:`
    <p><span class="mono">着</span> exprime qu'un état ou une action persiste : <i>他坐着看书。</i> (Il lit assis — l'action de « s'asseoir » persiste pendant qu'il lit.)</p>
    <ul>
      <li>Différence avec 在 : 在 décrit une action en cours (« il est en train de »), 着 décrit un état qui perdure (« il est dans l'état de »). On les combine souvent : <i>他正在门口站着。</i></li>
      <li>Phrase existentielle : <span class="mono">Lieu + 有 + objet</span> — <i>桌子上有一本书。</i> (Il y a un livre sur la table.) — l'objet est indéfini.</li>
      <li>Avec un objet défini, on utilise plutôt <span class="mono">Lieu + 是 + objet</span> : <i>桌子上是我的书。</i> (Sur la table, c'est mon livre.)</li>
    </ul>
    <div class="callout">« 着 » est aussi très fréquent en fin d'impératif poli : <i>拿着！</i> (Tiens, prends ça !) — l'objet reste dans la main du destinataire.</div>

      <li>On utilise 把 quand on parle d'un objet <b>précis et connu</b> (« le livre », pas « un livre »), et que le verbe a un complément qui décrit ce qu'il devient : <i>把门关上。</i> (Ferme la porte.)</li>

  title:"话题延伸词与判断动词",
  sub:"好像/以为/原来/从来/之一/倍 (HSK4)",
  intro:"Un lot de mots-outils HSK4 pour nuancer un jugement, exprimer une méprise, ou quantifier une comparaison.",
  vocab:[
    {han:"好像",py:"hǎoxiàng",fr:"il semble que, on dirait que",note:""},
    {han:"以为",py:"yǐwéi",fr:"croire à tort que (souvent contredit ensuite)",note:"différent de 认为 (penser que, sans erreur impliquée)"},
    {han:"原来",py:"yuánlái",fr:"à l'origine / en fait, il s'avère que",note:""},
    {han:"从来",py:"cónglái",fr:"jamais / toujours (avec 不/没)",note:"从来不 = ne jamais"},
    {han:"之一",py:"zhīyī",fr:"l'un/l'une de...",note:"我最好的朋友之一 = l'un de mes meilleurs amis"},
    {han:"倍",py:"bèi",fr:"fois (multiplicateur)",note:"是...的两倍 = c'est le double de..."}
  ],
  grammar:`
    <p><span class="mono">以为</span> implique presque toujours une croyance erronée, contredite par la suite : <i>我以为你不来了。</i> (Je croyais [à tort] que tu ne venais pas.) — différent de <span class="mono">认为</span> qui est une opinion neutre.</p>
    <ul>
      <li><span class="mono">原来</span> marque une découverte/révélation : <i>原来是你！</i> (Ah, c'est toi en fait !) — souvent traduit par « il s'avère que ».</li>
      <li><span class="mono">从来 + 不/没</span> renforce une négation habituelle ou totale : <i>他从来不迟到。</i> (Il n'est jamais en retard.)</li>
      <li><span class="mono">之一</span> se place après le nom : <i>这是最好的餐厅之一。</i> (C'est l'un des meilleurs restaurants.)</li>
      <li><span class="mono">Noun1 + 是 + Noun2 + 的 + Nombre + 倍</span> exprime un multiple : <i>他的工资是我的两倍。</i> (Son salaire est le double du mien.)</li>
    </ul>
    <div class="callout">« 以为 » vs « 认为 » est un piège classique : utilisez 以为 seulement quand la croyance s'est révélée fausse.</div>
  `,
  dialogue:[
    {sp:"A",han:"咦，原来你也在这儿！我以为你今天不来了。",fr:"Tiens, tu es là en fait ! Je croyais que tu venais pas aujourd'hui."},
    {sp:"B",han:"我从来不缺席这种聚会，这可是我最喜欢的活动之一。",fr:"Je rate jamais ce genre de soirée, c'est l'une de mes activités préférées."}
  ],
  ex:{
    mcq:[
      {q:"« 以为 » implique généralement :",options:["une opinion neutre","une croyance qui se révèle fausse","un ordre"],a:1},
      {q:"« 原来 » exprime souvent :",options:["une découverte, une révélation","une négation habituelle","une comparaison"],a:0},
      {q:"« 是...的两倍 » exprime :",options:["une multiplication par deux","une division par deux","une égalité"],a:0}
    ],
    listen:[
      {han:"从来",options:["jamais/toujours (avec négation)","parfois","souvent"],a:0},
      {han:"之一",options:["l'un/l'une de...","tous les","aucun"],a:0}
    ],
    fill:[
      {sentence:"« Il semble que » se dit ___像 (pinyin hǎo).",answer:"hao",hint:"1 mot"},
      {sentence:"« Il n'est jamais en retard » se dit 他___不迟到 (pinyin cónglái).",answer:"conglai",hint:"1 mot"}
    ]
  }
},

  sub:"Test de révision — tout le niveau HSK4",

  vocab:[

    {han:"因此 / 尽管...但是",py:"",fr:"connecteurs écrits",note:"unité 33"},
    {han:"是...的",py:"shì...de",fr:"structure d'emphase",note:"unité 34"},
    {han:"难道 / 连...都",py:"",fr:"questions rhétoriques et emphase",note:"unité 35"},
    {han:"给 / 教 / 送",py:"",fr:"double objet",note:"unité 36"},
    {han:"起来 / 下去 / 什么的",py:"",fr:"compléments abstraits et listes",note:"unité 37"},
    {han:"好像 / 以为 / 原来",py:"",fr:"mots de jugement",note:"unité 38"}
  ],
  grammar:`
    <p>Récapitulatif des points clés du niveau HSK4 :</p>
    <ul>
      <li>把字句 : Sujet+把+objet précis+verbe+complément, pour « traiter » un objet spécifique.</li>
      <li>Comparaison avancée : 越来越 (évolution progressive), 越...越... (proportionnalité), 不如 (infériorité nuancée).</li>
      <li>Connecteurs écrits : 因此/由于 (cause-conséquence formelle), 尽管...但是/然而... (concession formelle).</li>
      <li>是...的 : souligne un détail (temps/lieu/manière) d'une action passée déjà connue.</li>
      <li>难道/不是...吗 (question rhétorique) ; 连...都/也 (mise en relief d'un extrême).</li>
      <li>Double objet : Verbe+Destinataire+Objet (给/教/送/还).</li>
      <li>起来 (début d'un processus), 下去 (continuation), 什么的/等等 (liste non exhaustive).</li>
      <li>好像 (il semble que), 以为 (croire à tort), 原来 (il s'avère que), 从来 (jamais/toujours), 之一 (l'un de), 倍 (multiplicateur).</li>
    </ul>
  `,
  dialogue:[

    {sp:"B",han:"对，我把所有资料都看了一遍，连周末都在工作。原来我以为一天就能写完，结果花了一个星期。",fr:"Oui, j'ai relu tous les documents, j'ai même travaillé le week-end. En fait je croyais pouvoir finir en un jour, mais du coup ça a pris une semaine."}
  ],
  ex:{
    mcq:[

      {q:"« 越来越冷 » exprime :",options:["une action ponctuelle","une évolution progressive dans le temps","une négation"],a:1},
      {q:"« 是...的 » s'utilise pour :",options:["une action future","souligner un détail d'une action passée déjà connue","nier une action"],a:1},
      {q:"« 连...都 » sert à :",options:["mettre en relief un cas extrême","nier une action","poser une question fermée"],a:0},
      {q:"« 天气热起来了 » exprime :",options:["le début d'un processus","la fin d'un processus","une négation"],a:0},

    ],
    listen:[
      {han:"由于",options:["en raison de","malgré","afin de"],a:0},
      {han:"难道",options:["est-ce que vraiment (incrédulité)","bien sûr que","jamais"],a:0},
      {han:"原来",options:["il s'avère que, en fait","jamais","toujours"],a:0}

{
  id:41, level:5,
  title:"正式与非正式语体",
  sub:"Basculer entre registre formel et familier",
  intro:"Un même message se dit très différemment selon qu'on s'adresse à un supérieur, un inconnu, ou un ami proche.",
  vocab:[
    {han:"您",py:"nín",fr:"vous (poli, singulier)",note:"déjà vu à l'unité 2"},
    {han:"请问",py:"qǐngwèn",fr:"puis-je vous demander (formule polie)",note:""},
    {han:"...一下",py:"...yíxià",fr:"un instant, un peu (adoucit une demande)",note:"等一下 = attends un instant"},
    {han:"麻烦你",py:"máfan nǐ",fr:"désolé de te déranger, s'il te plaît",note:""},
    {han:"呗",py:"bei",fr:"particule très familière (« voilà, quoi »)",note:"minimise/évidence, registre décontracté"},
    {han:"嘛",py:"ma",fr:"particule familière d'évidence",note:"différent du 吗 interrogatif"}
  ],
  grammar:`
    <p>Le passage au registre formel se marque par le choix du pronom, des formules d'ouverture, et des particules finales.</p>
    <ul>
      <li><span class="mono">请问</span> ouvre poliment une question à un inconnu : <i>请问，洗手间在哪儿？</i> (Excusez-moi, où sont les toilettes ?)</li>
      <li><span class="mono">verbe + 一下</span> adoucit une demande, la rend plus légère : <i>你可以帮我一下吗？</i> (Tu peux m'aider un peu ?)</li>
      <li><span class="mono">呗</span> et <span class="mono">嘛</span> sont des particules très familières, à réserver aux amis proches : <i>没事儿，去呗！</i> (Pas de souci, vas-y, quoi !)</li>
    </ul>
    <div class="callout">« 麻烦你 » est une formule extrêmement utile et polie au quotidien en Chine — un bon réflexe pour toute demande de service, même simple.</div>
  `,
  dialogue:[
    {sp:"A",han:"请问，您知道地铁站怎么走吗？",fr:"Excusez-moi, savez-vous comment aller à la station de métro ?"},
    {sp:"B",han:"知道，麻烦你等我一下，我带你去。",fr:"Oui, attendez-moi un instant s'il vous plaît, je vous y emmène."}
  ],
  ex:{
    mcq:[
      {q:"« 请问 » s'utilise pour :",options:["donner un ordre","ouvrir poliment une question","refuser"],a:1},
      {q:"« 呗 » et « 嘛 » sont un registre :",options:["très formel","très familier, entre proches","administratif"],a:1},
      {q:"« Verbe + 一下 » sert à :",options:["renforcer un ordre","adoucir une demande","nier une action"],a:1}
    ],
    listen:[
      {han:"麻烦你",options:["désolé de te déranger","félicitations","au revoir"],a:0}
    ],
    fill:[
      {sentence:"« Vous » poli se dit ___ (pinyin nín).",answer:"nin",hint:"1 mot"},
      {sentence:"« Puis-je vous demander » se dit 请___ (pinyin wèn).",answer:"wen",hint:"1 mot"}
    ]
  }
},

    <p>Un chengyu s'insère directement dans une phrase comme un adjectif ou une expression toute faite, sans grammaire particulière à ajouter.</p>

      <li>La plupart des chengyu viennent de récits ou fables classiques — connaître l'histoire d'origine aide à mémoriser le sens (画蛇添足 vient d'une fable où quelqu'un, ayant gagné une course, ajoute des pattes à son dessin de serpent et perd le concours).</li>
    </ul>
    <div class="callout">Utiliser un chengyu au bon moment impressionne toujours un interlocuteur chinois — mais mieux vaut bien en comprendre le sens figuré avant de s'en servir, comme pour les proverbes vietnamiens.</div>

      <li><span class="mono">一...就...</span> exprime une succession immédiate : <i>我一到家就洗澡。</i> (Dès que j'arrive chez moi, je prends une douche.)</li>

{
  id:44, level:5,
  title:"让步结构",
  sub:"Structures de concession renforcée",
  intro:"Au-delà de 虽然...但是... (niveau 2), ce niveau explore des concessions plus fortes ou plus nuancées, utiles pour un discours argumentatif soutenu.",
  vocab:[
    {han:"即使...也...",py:"jíshǐ...yě...",fr:"même si...quand même... (concession hypothétique)",note:""},
    {han:"哪怕...也...",py:"nǎpà...yě...",fr:"même si, quand bien même (plus emphatique)",note:""},
    {han:"不管...都...",py:"bùguǎn...dōu...",fr:"peu importe... (proche de 无论)",note:""},
    {han:"再...也...",py:"zài...yě...",fr:"aussi...que ce soit, ...quand même",note:"再忙也要吃饭 = même très occupé, il faut manger"}
  ],
  grammar:`
    <p><span class="mono">即使...也...</span> exprime une concession hypothétique (même dans un cas qui ne s'est pas forcément produit) : <i>即使下雨，我也会去。</i> (Même s'il pleut, j'irai quand même.)</p>
    <ul>
      <li><span class="mono">哪怕</span> est plus emphatique, souvent utilisé pour un cas extrême : <i>哪怕只有一分钟，我也想见你。</i> (Même si ce n'est qu'une minute, je veux te voir.)</li>
      <li><span class="mono">不管...都...</span> est proche de 无论...都... (niveau 5, unité 38 - déjà vu) : généralisation malgré les circonstances.</li>
      <li><span class="mono">再...也...</span> insiste sur un degré extrême qui n'empêche pas la conséquence : <i>再累也要坚持。</i> (Même très fatigué, il faut persévérer.)</li>
    </ul>
    <div class="callout">Nuance : 虽然...但是... porte sur un fait réel et connu, alors que 即使...也... porte souvent sur une hypothèse, réelle ou non.</div>
  `,

    {sp:"B",han:"对，哪怕只剩一点希望，也值得坚持。",fr:"Oui, même s'il ne reste qu'un peu d'espoir, ça vaut le coup de persévérer."}

    ],

    <p>Récapitulatif des points clés du niveau HSK6 :</p>
    <ul>

      <li>Traces du chinois classique dans des mots composés modernes : 者 (celui qui...), 之 (particule figée), 其 (son/leur, soutenu).</li>

/* ---------------------------------------------------------
   TRADUCTEUR — Ouvrir DeepL ou Google Translate
--------------------------------------------------------- */
function openTranslator(text) {
  if (!text.trim()) {
    alert("Veuillez entrer du texte à traduire");
    return;
  }
  
  // Encoder le texte pour l'URL
  const encoded = encodeURIComponent(text);
  
  // Ouvrir DeepL dans une nouvelle fenêtre
  const deepLUrl = `https://www.deepl.com/translator#zh/fr/${encoded}`;
  window.open(deepLUrl, 'translator', 'width=900,height=700');
}

/* ---------------------------------------------------------
   ÉTAT & RENDU
--------------------------------------------------------- */
const doneUnits = new Set();
let currentUnit = 1;
const levelNames = {
  1:"HSK 1 — 入门 (Débutant)",
  2:"HSK 2 — 初级进阶 (Élémentaire)",
  3:"HSK 3 — 中级 (Intermédiaire)",
  4:"HSK 4 — 中高级 (Intermédiaire supérieur)",
  5:"HSK 5 — 高级 (Avancé)",
  6:"HSK 6 — 高级语法 (proche du C1)"
};

function norm(s){
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().trim().replace(/\s+/g,' ');
}

/* Mot du jour */
function getWordOfTheDay(){
  const allWords = [];
  units.forEach(u => u.vocab.forEach(v => {
    allWords.push({han:v.han, py:v.py, fr:v.fr, level:u.level});
  }));
  
  // Utiliser la date pour avoir le même mot toute la journée
  const today = new Date().toDateString();
  const seed = today.split('').reduce((a,b) => a + b.charCodeAt(0), 0);
  return allWords[seed % allWords.length];
}

/* Barre de progression */
function getProgress(){
  const total = units.length;
  const done = doneUnits.size;
  const percent = total > 0 ? Math.round((done / total) * 100) : 0;
  return {done, total, percent};
}

/* Ressources par niveau */
function getLevelResources(level){
  // Ressources désactivées pour le moment
  return [];
}

/* Tous les mots compilés */
function getAllWords(){
  const words = [];
  units.forEach(u => {
    u.vocab.forEach(v => {
      words.push({
        han: v.han,
        py: v.py,
        fr: v.fr,
        level: u.level,
        levelName: levelNames[u.level] || `Niveau ${u.level}`
      });
    });
  });
  return words;
}

function renderSidebar(){
  const wrap = document.getElementById('unitListWrap');
  wrap.innerHTML = '';
  
  // 🌟 MOT DU JOUR
  const wotd = getWordOfTheDay();
  const wotdDiv = document.createElement('div');
  wotdDiv.className = 'wotd-panel';
  wotdDiv.innerHTML = `
    <div class="label">🌟 Mot du jour</div>
    <div class="han">${wotd.han}</div>
    <div class="py">${wotd.py}</div>
    <div class="fr">${wotd.fr}</div>
    <button class="audio-btn" onclick="speak('${wotd.han.replace(/'/g,"\\'")}')" title="Écouter">🔊 Écouter</button>
  `;
  wrap.appendChild(wotdDiv);
  
  // 📊 PROGRESSION
  const prog = getProgress();
  const progDiv = document.createElement('div');
  progDiv.className = 'progress-section';
  progDiv.innerHTML = `
    <div class="progress-label">Progression: ${prog.done}/${prog.total} (${prog.percent}%)</div>
    <div class="progress-bar">
      <div class="progress-fill" style="width:${prog.percent}%"></div>
    </div>
  `;
  wrap.appendChild(progDiv);
  
  // 🎓 UNITÉS PAR NIVEAU
  const levels = [...new Set(units.map(u=>u.level))];
  levels.forEach(lvl=>{
    // Label + Ressources
    const labelContainer = document.createElement('div');
    labelContainer.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin:22px 0 8px 18px;';
    
    const label = document.createElement('div');
    label.className = 'level-label';
    label.textContent = levelNames[lvl] || `Niveau ${lvl}`;
    labelContainer.appendChild(label);
    
    // Ressources pour ce niveau
    const resources = getLevelResources(lvl);
    if(resources.length > 0){
      const resDiv = document.createElement('div');
      resDiv.className = 'resources-section';
      resDiv.style.margin = '0';
      resDiv.innerHTML = resources.map(r => 
        `<a href="${r.url}" target="_blank" title="${r.name}" style="font-size:.75rem;padding:3px 6px;">${r.name}</a>`
      ).join('');
      labelContainer.appendChild(resDiv);
    }
    
    wrap.appendChild(labelContainer);
    
    // Liste unités
    const track = document.createElement('div');
    track.className = 'unit-track';
    units.filter(u=>u.level===lvl).forEach(u=>{
      const btn = document.createElement('button');
      btn.className = 'unit-item' + (u.id===currentUnit?' active':'') + (doneUnits.has(u.id)?' done':'');
      btn.innerHTML = `Unité ${u.id} — ${u.title}<small>${u.sub}</small>` + (doneUnits.has(u.id)?'<span class="unit-check">✓</span>':'');
      btn.onclick = ()=>{ currentUnit = u.id; renderAll(); document.getElementById('sidebar').classList.remove('open'); window.scrollTo(0,0); };
      track.appendChild(btn);
    });
    wrap.appendChild(track);
  });
  
  // 📖 GLOSSAIRE
  const glossaryDiv = document.createElement('div');
  glossaryDiv.className = 'glossary-section';
  const allWords = getAllWords();
  const levels_unique = [...new Set(allWords.map(w => w.level))].sort((a,b) => a-b);
  
  glossaryDiv.innerHTML = `
    <h4>📖 Glossaire</h4>
    <div class="glossary-filter" id="glossaryFilter"></div>
    <div class="glossary-list" id="glossaryList"></div>
  `;
  wrap.appendChild(glossaryDiv);
  
  // Remplir filtres
  const filterDiv = document.getElementById('glossaryFilter');
  filterDiv.innerHTML = '<button class="filter-btn active" data-level="all">Tous</button>';
  levels_unique.forEach(lvl => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = (levelNames[lvl] || `Niveau ${lvl}`).split('—')[0].trim();
    btn.setAttribute('data-level', lvl);
    filterDiv.appendChild(btn);
  });
  
  // Afficher mots
  function showGlossary(filterLevel){
    const listDiv = document.getElementById('glossaryList');
    let filtered = allWords;
    if(filterLevel !== 'all'){
      filtered = allWords.filter(w => w.level == filterLevel);
    }
    
    listDiv.innerHTML = filtered.map(w => `
      <div class="glossary-item">
        <span class="han">${w.han}</span>
        <span class="py">${w.py}</span>
        <span class="fr">${w.fr}</span>
        <span class="level-badge">L${w.level}</span>
      </div>
    `).join('');
  }
  
  showGlossary('all');
  
  // Ajouter événements filtres
  document.querySelectorAll('#glossaryFilter .filter-btn').forEach(btn => {
    btn.onclick = function(){
      document.querySelectorAll('#glossaryFilter .filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      showGlossary(this.getAttribute('data-level'));
    };
  });
}

function renderMain(){
  const u = units.find(x=>x.id===currentUnit);
  const main = document.getElementById('main');

  let vocabRows = u.vocab.map(v=>`
    <tr>
      <td><div class="han-cell"><button class="audio-btn" onclick="speak('${v.han.replace(/'/g,"\\'")}')" title="Écouter">\uD83D\uDD0A</button><span class="han-word han">${v.han}</span></div></td>
      <td class="py">${v.py||''}</td>
      <td>${v.fr}</td>
      <td class="note">${v.note||''}</td>
    </tr>`).join('');

  let dialogueHtml = u.dialogue.map(d=>`
    <div class="dialogue-line">
      <div class="speaker">${d.sp} :</div>
      <div class="h han">${d.han}<button class="audio-btn" onclick="speak('${d.han.replace(/'/g,"\\'")}')" title="Écouter">\uD83D\uDD0A</button></div>
      <div class="fr">${d.fr}</div>
    </div>`).join('');

  let mcqHtml = u.ex.mcq.map((m,i)=>`
    <div class="exercise">
      <div class="q">${i+1}. ${m.q}</div>
      <div class="options">
        ${m.options.map((opt,j)=>`<button class="opt-btn" data-ex="mcq${i}" data-idx="${j}" onclick="checkMcq(${i},${j})">${opt}</button>`).join('')}
      </div>
    </div>`).join('');

  let listenHtml = u.ex.listen.map((l,i)=>{
    const word = l.word || l.han;
    return `
    <div class="exercise">
      <div class="q">${i+1}. <button class="big-audio-btn" onclick="speak('${word.replace(/'/g,"\\'")}')" style="margin-bottom:0;">\uD83D\uDD0A Écouter le mot</button></div>
      <div class="options">
        ${l.options.map((opt,j)=>`<button class="opt-btn" data-ex="listen${i}" data-idx="${j}" onclick="checkListen(${i},${j})">${opt}</button>`).join('')}
      </div>
    </div>`;
  }).join('');

  let fillHtml = u.ex.fill.map((f,i)=>`
    <div class="exercise">
      <div class="q">${i+1}. ${f.sentence}</div>
      <div class="fill-row">
        <input type="text" id="fill${i}" placeholder="${f.hint||''}">
        <button class="check-btn" onclick="checkFill(${i})">Vérifier</button>
      </div>
      <div class="fb" id="fillfb${i}"></div>
    </div>`).join('');

  const totalEx = u.ex.mcq.length + u.ex.listen.length + u.ex.fill.length;

  main.innerHTML = `
    <div class="unit-header">
      <span class="eyebrow">${(levelNames[u.level]||'').split('—')[0].trim()} · Unité ${u.id}/${units.length}</span>
      <h2 class="han">${u.title}</h2>
      <p class="sub">${u.sub}</p>
    </div>

    <section class="block">
      <p>${u.intro}</p>
    </section>

    <section class="block">
      <h3>词汇 — Vocabulaire (${u.vocab.length} mots)</h3>
      <div class="audio-note">🔊 Cliquez sur l'icône pour entendre la prononciation (synthèse vocale du navigateur — la qualité dépend des voix chinoises installées sur votre appareil).</div>
      <table class="vocab-table">
        <thead><tr><th>汉字</th><th>Pinyin</th><th>Français</th><th>Note</th></tr></thead>
        <tbody>${vocabRows}</tbody>
      </table>
    </section>

    ${u.grammar ? `<section class="block">
      <h3>语法 — Grammaire</h3>
      <div class="grammar-body">${u.grammar}</div>
    </section>` : ''}

    <section class="block">
      <h3>对话 — Dialogue</h3>
      ${dialogueHtml}
    </section>

    <section class="block">
      <h3>练习 — Choix multiple</h3>
      ${mcqHtml}
    </section>

    <section class="block">
      <h3>练习 — Écoute et choisis</h3>
      ${listenHtml}
    </section>

    <section class="block">
      <h3>练习 — Complétez (pinyin)</h3>
      ${fillHtml}
      <div class="score-bar">
        <span>Score de l'unité</span>
        <span class="num" id="scoreDisplay">0 / ${totalEx}</span>
      </div>
    </section>

    <div style="display:flex;justify-content:space-between;margin-top:10px;">
      <button class="check-btn" style="background:var(--jade-light)" onclick="goRel(-1)" ${u.id===1?'disabled':''}>← Unité précédente</button>
      <button class="check-btn" onclick="goRel(1)" ${u.id===units.length?'disabled':''}>Unité suivante →</button>
    </div>
  `;
  window._score = {correct:0, total: totalEx, answered:0};
}

function goRel(dir){
  const idx = units.findIndex(x=>x.id===currentUnit);
  const next = units[idx+dir];
  if(next){ currentUnit = next.id; renderAll(); window.scrollTo(0,0); }
}

function updateScore(){
  document.getElementById('scoreDisplay').textContent = `${window._score.correct} / ${window._score.total}`;
  if(window._score.answered >= window._score.total){
    if(window._score.correct / window._score.total >= 0.6){
      doneUnits.add(currentUnit);
      renderSidebar();
    }
  }
}

function checkMcq(qIndex, choiceIndex){
  const u = units.find(x=>x.id===currentUnit);
  const m = u.ex.mcq[qIndex];
  const btns = document.querySelectorAll(`[data-ex="mcq${qIndex}"]`);
  if(btns[0].disabled) return;
  btns.forEach((b,j)=>{
    b.disabled = true;
    if(j===m.a) b.classList.add('correct');
    else if(j===choiceIndex) b.classList.add('wrong');
  });
  window._score.answered++;
  if(choiceIndex===m.a) window._score.correct++;
  updateScore();
}

function checkListen(qIndex, choiceIndex){
  const u = units.find(x=>x.id===currentUnit);
  const m = u.ex.listen[qIndex];
  const btns = document.querySelectorAll(`[data-ex="listen${qIndex}"]`);
  if(btns[0].disabled) return;
  btns.forEach((b,j)=>{
    b.disabled = true;
    if(j===m.a) b.classList.add('correct');
    else if(j===choiceIndex) b.classList.add('wrong');
  });
  window._score.answered++;
  if(choiceIndex===m.a) window._score.correct++;
  updateScore();
}

function checkFill(i){
  const u = units.find(x=>x.id===currentUnit);
  const f = u.ex.fill[i];
  const input = document.getElementById('fill'+i);
  const fb = document.getElementById('fillfb'+i);
  if(input.disabled) return;
  const isCorrect = norm(input.value) === norm(f.answer);
  input.disabled = true;
  input.classList.add(isCorrect?'correct':'wrong');
  fb.textContent = isCorrect ? '✓ Correct !' : `✗ Réponse attendue : ${f.answer}`;
  fb.className = 'fb ' + (isCorrect?'ok-fb':'bad-fb');
  window._score.answered++;
  if(isCorrect) window._score.correct++;
  updateScore();
}

function renderAll(){
  renderSidebar();
  renderMain();
}

document.getElementById('menuBtn').onclick = ()=>{
  document.getElementById('sidebar').classList.toggle('open');
};

if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged = ()=>{ window.speechSynthesis.getVoices(); };
}

// Initialiser les boutons du traducteur
document.getElementById('translateBtn').onclick = () => {
  const text = document.getElementById('translatorInput').value;
  openTranslator(text);
};

document.getElementById('clearTranslatorBtn').onclick = () => {
  document.getElementById('translatorInput').value = '';
};

document.getElementById('translatorInput').onkeydown = (e) => {
  if (e.key === 'Enter' && e.ctrlKey) {
    const text = document.getElementById('translatorInput').value;
    openTranslator(text);
  }
};

// Mode sombre
function initTheme(){
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeButton(saved);
}

function updateThemeButton(theme){
  const btn = document.getElementById('themeBtn');
  btn.textContent = theme === 'dark' ? '☀️' : '🌙';
  btn.title = theme === 'dark' ? 'Mode clair' : 'Mode sombre';
}

function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeButton(next);
}

document.getElementById('themeBtn').onclick = toggleTheme;
initTheme();

renderAll();

// Register service worker for offline/installable PWA support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch((err) => {
      console.warn('Service worker registration failed:', err);
    });
  });
}
